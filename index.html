<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Generator</title>

    <!-- bootstreap  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- css  -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- navbar -->
    <nav class="navbar custom-navbar">
      <div class="container-fluid">
        <a class="navbar-brand">codeXgammer</a>
        <form class="d-flex " role="search">
          <input
            class="form-control me-2 search"
            type="search"
            placeholder="image search"
            aria-label="Search"
          />
          <button class="btn btn-outline-success search-btn" type="submit">Search</button>
        </form>
      </div>
    </nav>

       <div class="intro-container">
        <div class="intro-left">
          <h1>
            Generate Amazing 
            <span>AI Images</span>
          </h1>
          <p>
            Create stunning AI generated images using modern 
            artificial intelligence tools and creative prompts.
          </p>
          <button class="intro-btn" onclick="gotomsgbox()">
            Generate Now
          </button>
        </div>
        
        <div class="intro-right">
          <img src="https://i.pinimg.com/736x/df/d5/c6/dfd5c6dfa870f358c9e2d3f12061f2b6.jpg" class="img-thumbnail" alt="...">
        </div>
      </div>
    </div>

    <!-- seciton 2 -->
     <div class="msg-box" id="msgbox">
        <h3 class="text-center mb-4">AI Images Generate</h3>

        <form>
            <div class="mb-3">
                <textarea class="form-control" rows="8" placeholder="Prompt Here . . ."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 intro-btn">
                Submit
            </button>
        </form>
        <div class="container msg-box">
          <div class="text-center result">Image Here</div> 
        </div>
    </div>




    <!-- script -->
    <script src="script.js"></script>

    <!-- bootstreap js -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
